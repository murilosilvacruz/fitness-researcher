<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corpo e Saber — Research</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface-2: #f0eeea;
      --border: #e2dfd8;
      --text: #1a1814;
      --text-muted: #7a756c;
      --accent: #c8553d;
      --accent-light: #fdf0ed;
      --accent-hover: #b04733;
      --green: #2e7d4f;
      --green-light: #eaf5ee;
      --badge-bg: #ece9e3;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,.10);
      --radius: 10px;
      --sidebar-w: 260px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 8px;
    }
    .header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .logo { font-size: 15px; font-weight: 700; letter-spacing: -.3px; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    .logo span { color: var(--accent); }
    .header-actions { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }

    /* ── Menu button (mobile only) ── */
    #menuBtn {
      display: none;
      align-items: center; justify-content: center;
      background: none; border: none;
      padding: 6px; border-radius: 6px;
      cursor: pointer; color: var(--text);
      flex-shrink: 0;
    }
    #menuBtn:hover { background: var(--surface-2); }

    /* ── Run button ── */
    #runBtn {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      padding: 7px 14px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background .15s; white-space: nowrap;
    }
    #runBtn:hover:not(:disabled) { background: var(--accent-hover); }
    #runBtn:disabled { opacity: .6; cursor: not-allowed; }
    #runBtn svg { width: 14px; height: 14px; flex-shrink: 0; }
    .spinner { animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #statusMsg {
      font-size: 12px; color: var(--text-muted);
      max-width: 160px; text-align: right;
    }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; position: relative; }

    /* ── Sidebar overlay (mobile) ── */
    #sidebarOverlay {
      display: none;
      position: fixed;
      inset: 0;
      top: 56px;
      background: rgba(0,0,0,.4);
      z-index: 60;
    }
    #sidebarOverlay.open { display: block; }

    /* ── Sidebar ── */
    aside {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      position: sticky;
      top: 56px;
      height: calc(100vh - 56px);
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text-muted);
      padding: 0 18px 10px;
    }
    .week-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px; cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .1s, border-color .1s;
    }
    .week-item:hover { background: var(--surface-2); }
    .week-item.active { background: var(--accent-light); border-left-color: var(--accent); }
    .week-label { font-size: 13px; font-weight: 600; }
    .week-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .week-pill {
      font-size: 11px; font-weight: 600;
      background: var(--badge-bg); border-radius: 20px;
      padding: 2px 7px; white-space: nowrap;
    }
    .week-pill.done { background: var(--green-light); color: var(--green); }

    /* ── Main ── */
    main { flex: 1; padding: 28px 32px; max-width: 900px; min-width: 0; }

    .main-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
    }
    .main-title { font-size: 20px; font-weight: 700; }
    .main-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

    /* ── Filters ── */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .filter-btn {
      font-size: 12px; font-weight: 600;
      padding: 5px 12px; border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--surface); cursor: pointer;
      transition: all .15s; color: var(--text);
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Article card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      transition: box-shadow .15s, opacity .2s;
    }
    .card.read { opacity: .6; }
    .card:hover { box-shadow: var(--shadow-md); }
    .card.read .card-body { display: none; }
    .card.read.expanded .card-body { display: block; }

    .card-top { display: flex; align-items: flex-start; gap: 12px; }
    .read-check {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer; flex-shrink: 0; margin-top: 2px;
      background: var(--surface); transition: all .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .read-check.checked { background: var(--green); border-color: var(--green); }
    .read-check.checked::after { content: "✓"; color: #fff; font-size: 11px; font-weight: 700; }

    .card-info { flex: 1; min-width: 0; }
    .card-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--accent);
      margin-bottom: 4px;
    }
    .card-title {
      font-size: 15px; font-weight: 700; line-height: 1.4;
      margin-bottom: 6px;
    }
    .card-title a { color: inherit; text-decoration: none; }
    .card-title a:hover { color: var(--accent); }
    .card-source {
      font-size: 12px; color: var(--text-muted);
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border); }

    .card-title-en {
      font-size: 12px; color: var(--text-muted); font-style: italic;
      margin-top: 2px; margin-bottom: 4px;
    }

    .expand-btn {
      display: none;
      align-items: center; justify-content: center;
      background: none; border: none;
      color: var(--text-muted); cursor: pointer;
      padding: 2px; flex-shrink: 0; margin-top: 1px;
      transition: transform .2s, color .15s;
    }
    .expand-btn:hover { color: var(--text); }
    .expand-btn svg { width: 16px; height: 16px; }
    .card.read .expand-btn { display: flex; }
    .card.read.expanded .expand-btn { transform: rotate(180deg); }

    .card-body { margin-top: 14px; }

    .summary-section { margin-bottom: 14px; }
    .summary-section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--text-muted); margin-bottom: 5px;
    }
    .summary-text {
      font-size: 13.5px; line-height: 1.7; color: #3a3630;
      white-space: pre-wrap;
    }

    /* ── Toggle ── */
    .toggle-row {
      display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap;
    }
    .toggle-btn {
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      background: var(--surface-2); border: none; border-radius: 6px;
      padding: 5px 11px; cursor: pointer; transition: all .15s;
    }
    .toggle-btn:hover { background: var(--border); color: var(--text); }

    /* ── Play button ── */
    .play-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      background: var(--surface-2); border: none; border-radius: 6px;
      padding: 5px 11px; cursor: pointer; transition: all .15s;
    }
    .play-btn:hover { background: var(--border); color: var(--text); }
    .play-btn.playing {
      background: var(--accent-light); color: var(--accent);
      border: 1px solid #f3cec5;
    }
    .play-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* ── Nav tabs ── */
    .nav-tabs {
      display: flex; gap: 0; border-bottom: 2px solid var(--border);
      margin-bottom: 0; background: var(--surface);
      padding: 0 16px; position: sticky; top: 56px; z-index: 50;
    }
    .nav-tab {
      padding: 12px 18px; font-size: 13px; font-weight: 600;
      border: none; background: none; cursor: pointer; color: var(--text-muted);
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: color .15s, border-color .15s; white-space: nowrap;
    }
    .nav-tab:hover { color: var(--text); }
    .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-badge {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--badge-bg); border-radius: 10px;
      font-size: 10px; font-weight: 700; padding: 1px 6px; margin-left: 5px;
    }
    .tab-badge.pending { background: #fef3c7; color: #92400e; }
    .tab-badge.approved { background: var(--green-light); color: var(--green); }

    /* ── Review queue ── */
    .review-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
    }
    .review-filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .status-pill {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; padding: 3px 9px; border-radius: 20px;
    }
    .status-pill.APPROVED { background: var(--green-light); color: var(--green); }
    .status-pill.PENDING_REVIEW { background: #fef3c7; color: #92400e; }
    .status-pill.REJECTED { background: #fee2e2; color: #991b1b; }
    .status-pill.NO_EVAL { background: var(--badge-bg); color: var(--text-muted); }

    .review-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .review-card-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; cursor: pointer;
      border-bottom: 1px solid transparent;
      transition: background .1s;
    }
    .review-card-header:hover { background: var(--surface-2); }
    .review-card.expanded .review-card-header { border-bottom-color: var(--border); }
    .review-card-title { flex: 1; font-size: 14px; font-weight: 600; min-width: 0; }
    .review-card-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .review-card-body { padding: 18px; }

    .eval-scores {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px;
    }
    .score-chip {
      font-size: 11px; font-weight: 600;
      background: var(--surface-2); border-radius: 6px;
      padding: 4px 9px; display: flex; align-items: center; gap: 5px;
    }
    .score-chip .score-val { color: var(--accent); }
    .score-chip.good .score-val { color: var(--green); }
    .score-chip.bad .score-val { color: #dc2626; }

    .review-content-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 14px; margin-bottom: 14px;
    }
    @media (max-width: 700px) {
      .review-content-grid { grid-template-columns: 1fr; }
    }
    .review-content-box {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 12px;
    }
    .review-content-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text-muted); margin-bottom: 6px;
    }
    .review-content-text {
      font-size: 12.5px; line-height: 1.65; white-space: pre-wrap; color: #3a3630;
      max-height: 180px; overflow-y: auto;
    }

    .llm-feedback {
      background: var(--accent-light);
      border: 1px solid #f3cec5;
      border-radius: 8px; padding: 12px; margin-bottom: 14px;
    }
    .llm-feedback-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--accent); margin-bottom: 5px;
    }
    .llm-feedback-text { font-size: 13px; line-height: 1.6; }

    .review-actions { display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; }
    .review-note-input {
      flex: 1; min-width: 200px; font-size: 13px; padding: 7px 10px;
      border: 1.5px solid var(--border); border-radius: 7px;
      background: var(--surface); color: var(--text);
      font-family: inherit;
    }
    .review-note-input:focus { outline: none; border-color: var(--accent); }
    .btn-approve {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--green); color: #fff;
      border: none; border-radius: 7px; padding: 7px 14px;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .btn-approve:hover { opacity: .85; }
    .btn-reject {
      display: inline-flex; align-items: center; gap: 5px;
      background: #dc2626; color: #fff;
      border: none; border-radius: 7px; padding: 7px 14px;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .btn-reject:hover { opacity: .85; }

    /* ── Instagram panel ── */
    .ig-panel {
      margin-top: 14px;
      background: linear-gradient(135deg, #fdf0ed 0%, #fce8e2 100%);
      border: 1px solid #f3cec5;
      border-radius: 8px;
      padding: 14px 16px;
    }
    .ig-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--accent); margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .ig-text {
      font-size: 13px; line-height: 1.65; white-space: pre-wrap; color: #3a3630;
    }
    .copy-btn {
      margin-top: 10px; font-size: 12px; font-weight: 600;
      padding: 5px 12px; border-radius: 6px;
      border: 1.5px solid var(--accent); color: var(--accent);
      background: transparent; cursor: pointer; transition: all .15s;
    }
    .copy-btn:hover { background: var(--accent); color: #fff; }
    .copy-btn.copied { background: var(--green); border-color: var(--green); color: #fff; }

    /* ── Summary panel ── */
    .summary-panel {
      margin-top: 14px;
      background: linear-gradient(135deg, #f0f5f0 0%, #e8f2e8 100%);
      border: 1px solid #b8d4b8;
      border-radius: 8px;
      padding: 14px 16px;
    }
    .summary-panel .ig-label { color: var(--green); }

    /* ── Published row ── */
    .published-row {
      display: flex; align-items: center; gap: 7px;
      margin-top: 10px;
    }
    .published-checkbox {
      width: 15px; height: 15px; cursor: pointer;
      accent-color: var(--green); flex-shrink: 0;
    }
    .published-label {
      font-size: 12px; color: var(--text-muted);
      cursor: pointer; user-select: none;
    }
    .published-label.checked { color: var(--green); font-weight: 600; }

    /* ── Image modal ── */
    .img-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.88); z-index: 200;
      align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    .img-modal-overlay.open { display: flex; }
    .img-modal-img {
      max-width: min(88vw, 560px); max-height: 88vh;
      border-radius: 10px; object-fit: contain;
      box-shadow: 0 12px 40px rgba(0,0,0,.6);
      cursor: default;
    }
    .img-modal-close {
      position: fixed; top: 18px; right: 22px;
      background: rgba(255,255,255,.15); border: none;
      color: #fff; font-size: 22px; line-height: 1;
      cursor: pointer; border-radius: 50%;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px); transition: background .15s;
    }
    .img-modal-close:hover { background: rgba(255,255,255,.28); }

    /* ── Empty / loading ── */
    .state-msg {
      text-align: center; padding: 80px 20px;
      color: var(--text-muted); font-size: 14px;
    }
    .state-msg strong { display: block; font-size: 18px; color: var(--text); margin-bottom: 8px; }

    .skeleton {
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .sk-line { height: 13px; margin-bottom: 8px; }
    .sk-title { height: 18px; width: 75%; margin-bottom: 10px; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      #menuBtn { display: flex; }
      #statusMsg { display: none; }

      #runBtn .btn-label { display: none; }
      #runBtn { padding: 7px 10px; }

      aside {
        position: fixed;
        top: 56px;
        left: 0;
        width: min(var(--sidebar-w), 80vw);
        height: calc(100vh - 56px);
        z-index: 70;
        transform: translateX(-110%);
        transition: transform .25s ease;
        box-shadow: var(--shadow-md);
      }
      aside.open { transform: translateX(0); }

      main { padding: 16px; }

      .card { padding: 14px; }

      .main-title { font-size: 17px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <button id="menuBtn" onclick="toggleSidebar()" aria-label="Abrir menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="logo"><span>Corpo e Saber</span> — Research</div>
  </div>
  <div class="header-actions">
    <div id="statusMsg"></div>
    <button id="runBtn" onclick="runResearch()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path d="M9 10l6 2-6 2V10z" fill="currentColor" stroke="none"/></svg>
      <span class="btn-label">Nova pesquisa</span>
    </button>
  </div>
</header>

<div id="sidebarOverlay" onclick="closeSidebar()"></div>

<nav class="nav-tabs">
  <button class="nav-tab active" id="tab-research" onclick="switchTab('research')">Pesquisas</button>
  <button class="nav-tab" id="tab-queue" onclick="switchTab('queue')">
    Fila de Publicação
    <span class="tab-badge pending" id="queue-badge" style="display:none"></span>
  </button>
</nav>

<div class="layout">
  <aside id="sidebar">
    <div class="sidebar-title">Pesquisas</div>
    <div id="weekList"><div style="padding:18px;font-size:13px;color:var(--text-muted)">Carregando...</div></div>
  </aside>

  <main>
    <div id="content">
      <div class="state-msg"><strong>Selecione uma pesquisa</strong>Escolha uma data na barra lateral para ver os artigos.</div>
    </div>
    <div id="queue-content" style="display:none">
      <div class="state-msg"><strong>Carregando fila...</strong></div>
    </div>
  </main>
</div>

<div id="imageModal" class="img-modal-overlay" onclick="handleModalClick(event)">
  <button class="img-modal-close" onclick="closeImageModal()" title="Fechar">✕</button>
  <img id="imageModalImg" class="img-modal-img" src="" alt="Background do post" onclick="event.stopPropagation()">
</div>

<script>
  let currentDate = null;
  let allArticles = [];
  let currentRunMeta = null;
  let activeFilter = 'all';
  let pollingInterval = null;

  const captionMap = {};

  // ── Boot ──────────────────────────────────────────────────────────────────
  loadRuns();

  async function loadRuns() {
    const res = await fetch('/api/runs');
    const runs = await res.json();
    renderSidebar(runs);
    if (runs.length > 0) selectRun(runs[0].date);
  }

  function renderSidebar(runs) {
    const el = document.getElementById('weekList');
    if (!runs.length) {
      el.innerHTML = '<div style="padding:18px;font-size:13px;color:var(--text-muted)">Nenhum relatório ainda.</div>';
      return;
    }
    el.innerHTML = runs.map(r => {
      const allDone = r.read === r.total && r.total > 0;
      return `
        <div class="week-item" id="run-${r.date}" onclick="selectRun('${r.date}')">
          <div>
            <div class="week-label">${formatDateLabel(r.date)}</div>
            <div class="week-meta">${formatTime(r.generated_at)}</div>
          </div>
          <div class="week-pill ${allDone ? 'done' : ''}">${r.read}/${r.total}</div>
        </div>`;
    }).join('');
  }

  async function selectRun(date) {
    currentDate = date;
    activeFilter = 'all';
    document.querySelectorAll('.week-item').forEach(el => el.classList.remove('active'));
    const item = document.getElementById(`run-${date}`);
    if (item) item.classList.add('active');

    closeSidebar();
    stopAudio();

    document.getElementById('content').innerHTML = renderSkeletons();
    const res = await fetch(`/api/runs/${date}`);
    const data = await res.json();
    allArticles = data.articles;
    currentRunMeta = { date: data.date, generated_at: data.generated_at, labels: data.labels };

    for (const a of allArticles) {
      if (a.instagram_caption) captionMap[a.id] = a.instagram_caption;
    }

    renderContent();
  }

  function renderContent() {
    if (!currentRunMeta) return;
    const labels = ['all', ...currentRunMeta.labels];
    const filtered = activeFilter === 'all'
      ? allArticles
      : allArticles.filter(a => a.label === activeFilter);
    const readCount = allArticles.filter(a => a.read).length;

    document.getElementById('content').innerHTML = `
      <div class="main-header">
        <div>
          <div class="main-title">${formatDateLabel(currentRunMeta.date)}</div>
          <div class="main-meta">Gerado às ${formatTime(currentRunMeta.generated_at)} · ${allArticles.length} artigos · ${readCount} lidos</div>
        </div>
      </div>
      <div class="filters">
        ${labels.map(l => `<button class="filter-btn ${activeFilter === l ? 'active' : ''}" onclick="setFilter('${escapeAttr(l)}')">${l === 'all' ? 'Todos' : escapeHtml(l)}</button>`).join('')}
      </div>
      <div id="articleList">
        ${filtered.map(renderCard).join('')}
      </div>`;
  }

  function setFilter(label) {
    activeFilter = label;
    renderContent();
  }

  function renderCard(a) {
    const titlePt = a.title_pt || a.title || '';

          <div class="card-info" onclick="if(this.closest('.card').classList.contains('read')) toggleExpand('${a.id}')" style="${a.read ? 'cursor:pointer' : ''}">
            <div class="card-label">${escapeHtml(a.label)}</div>
            <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${escapeHtml(titlePt)}</a></div>
            ${titleEn && titleEn !== titlePt ? `<div class="card-title-en">${escapeHtml(titleEn)}</div>` : ''}
            <div class="card-source">
              <span>${escapeHtml(a.source)}</span>
              <span class="dot"></span>
              <span>${escapeHtml(a.published_date)}</span>
            </div>
          </div>
          <button class="expand-btn" onclick="toggleExpand('${a.id}')" title="Expandir">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>

        </div>
        <div class="card-body">

              renderSummarySection('✅ Conclusão', a.conclusion) +

          <div class="toggle-row">
            <button class="play-btn" id="play-${a.id}" onclick="toggleAudio('${a.id}')">
              <svg id="play-icon-${a.id}" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              <span id="play-label-${a.id}">Ouvir</span>

            <button class="toggle-btn" onclick="toggleCaptionPanel('${date}', '${a.id}')">📱 Ver legenda</button>

              onchange="togglePublished('${date}', '${a.id}', this.checked)">
            <label for="pub-${a.id}" class="published-label ${isPublished ? 'checked' : ''}">Publicado no Instagram</label>
          </div>
          <div class="ig-panel" id="ig-${a.id}" style="display:none">
            <div class="ig-label">📱 Legenda do post</div>

            <button class="copy-btn" id="copy-${a.id}" onclick="copyCaption('${a.id}')">Copiar legenda</button>
          </div>
          <div class="ig-panel summary-panel" id="summary-panel-${a.id}" style="display:none">
            <div class="ig-label">📄 Texto do Post (summary.txt)</div>
            <div class="ig-text" id="summary-text-${a.id}">Carregando...</div>
          </div>
        </div>
      </div>`;
  }

  function renderSummarySection(title, text) {
    if (!text) return '';
    return `
      <div class="summary-section">
        <div class="summary-section-title">${title}</div>
        <div class="summary-text">${escapeHtml(text)}</div>
      </div>`;
  }

  async function toggleRead(id, isRead) {
    await fetch(`/api/articles/${id}/read`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ read: isRead }),

    if (article) article.read = isRead;

    const card = document.getElementById(`card-${id}`);
    const check = card?.querySelector('.read-check');

      card.classList.toggle('read', isRead);
      if (isRead) card.classList.remove('expanded');

    const res = await fetch('/api/runs');
    const runs = await res.json();

  // ── Post data cache (caption.txt + summary.txt) ──────────────────────────
  const postDataCache = {};

  async function loadPostData(date, id) {
    const key = `${date}/${id}`;
    if (postDataCache[key]) return postDataCache[key];
    try {
      const res = await fetch(`/api/posts/${date}/${id}`);
      if (!res.ok) return null;
      const data = await res.json();
      postDataCache[key] = data;
      if (data.caption) captionMap[id] = data.caption;
      return data;
    } catch { return null; }
  }

  async function toggleCaptionPanel(date, id) {
    const panel = document.getElementById(`ig-${id}`);
    if (!panel) return;
    const visible = panel.style.display !== 'none';
    if (visible) { panel.style.display = 'none'; return; }
    panel.style.display = 'block';
    const textEl = document.getElementById(`ig-text-${id}`);
    if (textEl && textEl.dataset.loaded !== '1') {
      const data = await loadPostData(date, id);
      if (textEl) {
        textEl.textContent = data?.caption || '(sem legenda)';
        textEl.dataset.loaded = '1';
      }
    }
  }

  async function toggleSummaryPanel(date, id) {
    const panel = document.getElementById(`summary-panel-${id}`);
    if (!panel) return;
    const visible = panel.style.display !== 'none';
    if (visible) { panel.style.display = 'none'; return; }
    panel.style.display = 'block';
    const textEl = document.getElementById(`summary-text-${id}`);
    if (textEl && textEl.dataset.loaded !== '1') {
      const data = await loadPostData(date, id);
      if (textEl) {
        textEl.textContent = data?.summary || '(sem summary)';
        textEl.dataset.loaded = '1';
      }
    }
  }

    const img = document.getElementById('imageModalImg');
    if (!modal || !img) return;
    img.src = `/api/posts/${date}/${id}/background`;

  }

  async function togglePublished(date, id, published) {
    try {
      await fetch(`/api/posts/${date}/${id}/published`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ published }),

  async function copyCaption(id) {
    const text = captionMap[id] || '';
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById(`copy-${id}`);
    if (!btn) return;

  // ── Audio (TTS) ───────────────────────────────────────────────────────────
  let currentSpeakingId = null;

  const ICON_PLAY  = `<path d="M8 5v14l11-7z"/>`;
  const ICON_PAUSE = `<path d="M6 19h4V5H6zm8-14v14h4V5z"/>`;

  function buildArticleText(a) {
    const parts = [];
    if (a.title_pt || a.title) parts.push((a.title_pt || a.title) + '.');
    if (a.objective)       parts.push('Objetivo. ' + a.objective);
    if (a.conclusion)      parts.push('Conclusão. ' + a.conclusion);
    if (a.supporting_data) parts.push('Dados de suporte. ' + a.supporting_data);
    return parts.join('\n\n');
  }

  function setPlayState(id, state) {
    const btn   = document.getElementById(`play-${id}`);
    const icon  = document.getElementById(`play-icon-${id}`);
    const label = document.getElementById(`play-label-${id}`);
    if (!btn) return;
    if (state === 'playing') {
      btn.classList.add('playing');
      icon.innerHTML = ICON_PAUSE;
      label.textContent = 'Pausar';
    } else if (state === 'paused') {
      btn.classList.add('playing');
      icon.innerHTML = ICON_PLAY;
      label.textContent = 'Retomar';
    } else {
      btn.classList.remove('playing');
      icon.innerHTML = ICON_PLAY;
      label.textContent = 'Ouvir';
    }
  }

  function toggleAudio(id) {
    // Pause/resume if this article is already active
    if (currentSpeakingId === id) {
      if (speechSynthesis.paused) {
        speechSynthesis.resume();
        setPlayState(id, 'playing');
      } else {
        speechSynthesis.pause();
        setPlayState(id, 'paused');
      }
      return;
    }

    // Stop whatever was playing before
    if (currentSpeakingId) {
      speechSynthesis.cancel();
      setPlayState(currentSpeakingId, 'idle');
    }

    const article = allArticles.find(a => a.id === id);
    if (!article) return;

    const utterance = new SpeechSynthesisUtterance(buildArticleText(article));
    utterance.lang = 'pt-BR';
    utterance.rate = 1.0;
    utterance.onend = () => { currentSpeakingId = null; setPlayState(id, 'idle'); };
    utterance.onerror = () => { currentSpeakingId = null; setPlayState(id, 'idle'); };

    currentSpeakingId = id;
    setPlayState(id, 'playing');
    speechSynthesis.cancel(); // flush any pending utterance
    speechSynthesis.speak(utterance);
  }

  // Stop audio when changing weeks
  function stopAudio() {
    if (currentSpeakingId) {
      speechSynthesis.cancel();
      setPlayState(currentSpeakingId, 'idle');
      currentSpeakingId = null;
    }
  }

  // ── Sidebar (mobile) ──────────────────────────────────────────────────────
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const isOpen = sidebar.classList.toggle('open');
    overlay.classList.toggle('open', isOpen);
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }

  // ── Run research ──────────────────────────────────────────────────────────
  async function runResearch() {
    const btn = document.getElementById('runBtn');
    const msg = document.getElementById('statusMsg');
    btn.disabled = true;
    btn.innerHTML = `<svg class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg><span class="btn-label"> Pesquisando...</span>`;
    msg.textContent = 'Isso pode levar alguns minutos...';

    const res = await fetch('/api/research/run', { method: 'POST' });
    if (res.status === 409) {
      msg.textContent = 'Já está rodando...';
      btn.disabled = false;
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path d="M9 10l6 2-6 2V10z" fill="currentColor" stroke="none"/></svg><span class="btn-label"> Nova pesquisa</span>`;
      return;
    }

    clearInterval(pollingInterval);
    pollingInterval = setInterval(async () => {
      const s = await fetch('/api/research/status').then(r => r.json());
      if (s.status === 'done') {
        clearInterval(pollingInterval);
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path d="M9 10l6 2-6 2V10z" fill="currentColor" stroke="none"/></svg><span class="btn-label"> Nova pesquisa</span>`;
        msg.textContent = s.exit_code === 0 ? '✓ Pesquisa concluída!' : '✗ Erro ao pesquisar.';
        setTimeout(() => { msg.textContent = ''; }, 5000);
        if (s.exit_code === 0) loadRuns();
      }
    }, 5000);
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function renderSkeletons() {
    return Array.from({length: 4}).map(() => `
      <div class="card">
        <div class="skeleton sk-title"></div>
        <div class="skeleton sk-line" style="width:45%"></div>
        <div style="margin-top:12px">
          <div class="skeleton sk-line"></div>
          <div class="skeleton sk-line"></div>
          <div class="skeleton sk-line" style="width:70%"></div>
        </div>
      </div>`).join('');
  }

  function formatDateLabel(date) {
    if (!date) return '';
    try {
      const [year, month, day] = date.split('-');
      const d = new Date(Number(year), Number(month) - 1, Number(day));
      return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
    } catch { return date; }
  }

  function formatTime(iso) {
    if (!iso) return '';
    try {
      return new Date(iso).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    } catch { return iso; }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escapeAttr(str) {
    if (!str) return '';
    return str.replace(/'/g,"\\'");
  }

  // ── Tabs ──────────────────────────────────────────────────────────────────
  let currentTab = 'research';

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-research').classList.toggle('active', tab === 'research');
    document.getElementById('tab-queue').classList.toggle('active', tab === 'queue');
    document.getElementById('sidebar').style.display = tab === 'research' ? '' : 'none';
    document.getElementById('content').style.display = tab === 'research' ? '' : 'none';
    document.getElementById('queue-content').style.display = tab === 'queue' ? '' : 'none';
    if (tab === 'queue') loadQueue();
  }

  // ── Review Queue ──────────────────────────────────────────────────────────
  let allPosts = [];
  let queueFilter = 'PENDING_REVIEW';

  async function loadQueue() {
    const el = document.getElementById('queue-content');
    el.innerHTML = '<div class="state-msg"><strong>Carregando fila...</strong></div>';
    try {
      const res = await fetch('/api/posts');
      allPosts = await res.json();
      renderQueue();
      updateQueueBadge();
    } catch (e) {
      el.innerHTML = '<div class="state-msg"><strong>Erro ao carregar fila</strong></div>';
    }
  }

  async function updateQueueBadge() {
    try {
      const res = await fetch('/api/posts/stats');
      const stats = await res.json();
      const badge = document.getElementById('queue-badge');
      const count = (stats.PENDING_REVIEW || 0);
      if (count > 0) {
        badge.textContent = count;
        badge.style.display = '';
      } else {
        badge.style.display = 'none';
      }
    } catch (_) {}
  }

  function renderQueue() {
    const el = document.getElementById('queue-content');
    const filtered = queueFilter === 'all' ? allPosts : allPosts.filter(p => p.status === queueFilter);

    const counts = { APPROVED: 0, PENDING_REVIEW: 0, REJECTED: 0, NO_EVAL: 0 };
    allPosts.forEach(p => { counts[p.status] = (counts[p.status] || 0) + 1; });

    const filters = [
      { key: 'PENDING_REVIEW', label: 'Aguardando revisão', badge: counts.PENDING_REVIEW },
      { key: 'APPROVED', label: 'Aprovados', badge: counts.APPROVED },
      { key: 'REJECTED', label: 'Rejeitados', badge: counts.REJECTED },
      { key: 'all', label: 'Todos', badge: allPosts.length },
    ];

    el.innerHTML = `
      <div class="review-header">
        <div>
          <div class="main-title">Fila de Publicação</div>
          <div class="main-meta">${allPosts.length} posts gerados · ${counts.APPROVED} aprovados · ${counts.PENDING_REVIEW} aguardando</div>
        </div>
      </div>
      <div class="review-filters" style="margin-bottom:20px">
        ${filters.map(f => `
          <button class="filter-btn ${queueFilter === f.key ? 'active' : ''}" onclick="setQueueFilter('${f.key}')">
            ${f.label}${f.badge > 0 ? ` <span style="opacity:.7">(${f.badge})</span>` : ''}
          </button>`).join('')}
      </div>
      <div id="reviewList">
        ${filtered.length === 0
          ? '<div class="state-msg" style="padding:40px 20px"><strong>Nenhum post</strong>Nenhum post com este status.</div>'
          : filtered.map(renderReviewCard).join('')}
      </div>`;
  }

  function setQueueFilter(filter) {
    queueFilter = filter;
    renderQueue();
  }

  function renderReviewCard(post) {
    const eval_ = post.eval || {};
    const auto = eval_.auto || {};
    const llm = eval_.llm || null;

    const summaryTitle = extractSummaryTitle(post.summary);
    const pilar = extractSummaryPilar(post.summary);

    const autoScore = auto.score != null ? Math.round(auto.score * 100) : null;
    const llmScore = llm ? Math.round(llm.score_normalized * 100) : null;

    function scoreClass(val) {
      if (val == null) return '';
      return val >= 72 ? 'good' : val < 52 ? 'bad' : '';
    }

    const failures = (auto.failures || []).map(f =>
      `<div style="font-size:12px;color:#dc2626;margin-top:3px">⚠ ${escapeHtml(f)}</div>`
    ).join('');

    const llmDetails = llm ? `
      <div class="eval-scores" style="margin-top:8px">
        ${[
          ['Voz da marca', llm.brand_alignment],
          ['Gancho', llm.hook_quality],
          ['Ciência', llm.scientific_clarity],
          ['Pilar', llm.pilar_fit],
          ['CTA', llm.cta_effectiveness],
        ].map(([label, val]) => `
          <div class="score-chip ${val >= 4 ? 'good' : val <= 2 ? 'bad' : ''}">
            ${label} <span class="score-val">${val}/5</span>
          </div>`).join('')}
      </div>
      ${llm.feedback ? `
      <div class="llm-feedback" style="margin-top:12px">
        <div class="llm-feedback-label">Feedback do avaliador</div>
        <div class="llm-feedback-text">${escapeHtml(llm.feedback)}</div>
      </div>` : ''}` : '';

    const notes = eval_.notes || '';

    return `
      <div class="review-card" id="rcard-${post.date}-${post.id}">
        <div class="review-card-header" onclick="toggleReviewCard('${post.date}', '${post.id}')">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span class="status-pill ${post.status}">${statusLabel(post.status)}</span>
              ${pilar ? `<span style="font-size:11px;color:var(--text-muted);font-weight:600">${escapeHtml(pilar)}</span>` : ''}
            </div>
            <div class="review-card-title" style="margin-top:5px">${escapeHtml(summaryTitle || post.id)}</div>
            <div class="review-card-meta">${post.date}${post.has_image ? ' · imagem gerada' : ''}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
            ${autoScore != null ? `<div class="score-chip ${scoreClass(autoScore)}">Auto <span class="score-val">${autoScore}%</span></div>` : ''}
            ${llmScore != null ? `<div class="score-chip ${scoreClass(llmScore)}">LLM <span class="score-val">${llmScore}%</span></div>` : ''}
          </div>
        </div>
        <div class="review-card-body" id="rbody-${post.date}-${post.id}" style="display:none">
          <div class="eval-scores">
            ${autoScore != null ? `<div class="score-chip ${scoreClass(autoScore)}">Score auto: <span class="score-val">${autoScore}%</span></div>` : ''}
            ${failures}
          </div>
          ${llmDetails}
          <div class="review-content-grid">
            <div class="review-content-box">
              <div class="review-content-label">Texto da Imagem (summary.txt)</div>
              <div class="review-content-text">${escapeHtml(post.summary)}</div>
            </div>
            <div class="review-content-box">
              <div class="review-content-label">Legenda (caption.txt)</div>
              <div class="review-content-text">${escapeHtml(post.caption)}</div>
            </div>
          </div>
          <div class="review-actions">
            <textarea class="review-note-input" id="note-${post.date}-${post.id}" placeholder="Nota de rejeição (opcional)..." rows="2">${escapeHtml(notes)}</textarea>
            <button class="btn-approve" onclick="approvePost('${post.date}', '${post.id}')">✓ Aprovar</button>
            <button class="btn-reject" onclick="rejectPost('${post.date}', '${post.id}')">✕ Rejeitar</button>
          </div>
        </div>
      </div>`;
  }

  function toggleReviewCard(date, id) {
    const body = document.getElementById(`rbody-${date}-${id}`);
    if (!body) return;
    body.style.display = body.style.display === 'none' ? 'block' : 'none';
    const card = document.getElementById(`rcard-${date}-${id}`);
    if (card) card.classList.toggle('expanded', body.style.display !== 'none');
  }

  async function approvePost(date, id) {
    await fetch(`/api/posts/${date}/${id}/approve`, { method: 'POST' });
    await loadQueue();
  }

  async function rejectPost(date, id) {
    const notes = document.getElementById(`note-${date}-${id}`)?.value || '';
    await fetch(`/api/posts/${date}/${id}/reject`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ notes }),
    });
    await loadQueue();
  }

  function extractSummaryTitle(summary) {
    if (!summary) return '';
    const match = summary.match(/^TITULO:\s*(.+)/m);
    return match ? match[1].trim() : '';
  }

  function extractSummaryPilar(summary) {
    if (!summary) return '';
    const match = summary.match(/^PILAR:\s*(.+)/m);
    return match ? match[1].trim() : '';
  }

  function statusLabel(status) {
    const labels = {
      APPROVED: 'Aprovado',
      PENDING_REVIEW: 'Aguardando revisão',
      REJECTED: 'Rejeitado',
      NO_EVAL: 'Sem avaliação',
    };
    return labels[status] || status;
  }

  // Load queue badge on boot
  updateQueueBadge();
</script>
