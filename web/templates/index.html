<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Research</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface-2: #f0eeea;
      --border: #e2dfd8;
      --text: #1a1814;
      --text-muted: #7a756c;
      --accent: #c8553d;
      --accent-light: #fdf0ed;
      --accent-hover: #b04733;
      --green: #2e7d4f;
      --green-light: #eaf5ee;
      --badge-bg: #ece9e3;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,.10);
      --radius: 10px;
      --sidebar-w: 260px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 15px; font-weight: 700; letter-spacing: -.3px; display: flex; align-items: center; gap: 8px; }
    .logo span { color: var(--accent); }
    .header-actions { display: flex; gap: 10px; align-items: center; }

    /* ── Run button ── */
    #runBtn {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      padding: 7px 14px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    #runBtn:hover:not(:disabled) { background: var(--accent-hover); }
    #runBtn:disabled { opacity: .6; cursor: not-allowed; }
    #runBtn svg { width: 14px; height: 14px; }
    .spinner { animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #statusMsg {
      font-size: 12px; color: var(--text-muted);
      max-width: 200px; text-align: right;
    }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; }

    /* ── Sidebar ── */
    aside {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      position: sticky;
      top: 56px;
      height: calc(100vh - 56px);
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text-muted);
      padding: 0 18px 10px;
    }
    .week-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px; cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .1s, border-color .1s;
    }
    .week-item:hover { background: var(--surface-2); }
    .week-item.active { background: var(--accent-light); border-left-color: var(--accent); }
    .week-label { font-size: 13px; font-weight: 600; }
    .week-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .week-pill {
      font-size: 11px; font-weight: 600;
      background: var(--badge-bg); border-radius: 20px;
      padding: 2px 7px; white-space: nowrap;
    }
    .week-pill.done { background: var(--green-light); color: var(--green); }

    /* ── Main ── */
    main { flex: 1; padding: 28px 32px; max-width: 900px; }

    .main-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
    }
    .main-title { font-size: 20px; font-weight: 700; }
    .main-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

    /* ── Filters ── */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .filter-btn {
      font-size: 12px; font-weight: 600;
      padding: 5px 12px; border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--surface); cursor: pointer;
      transition: all .15s; color: var(--text);
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Article card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      transition: box-shadow .15s, opacity .2s;
    }
    .card.read { opacity: .55; }
    .card:hover { box-shadow: var(--shadow-md); }

    .card-top { display: flex; align-items: flex-start; gap: 12px; }
    .read-check {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer; flex-shrink: 0; margin-top: 2px;
      background: var(--surface); transition: all .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .read-check.checked { background: var(--green); border-color: var(--green); }
    .read-check.checked::after { content: "✓"; color: #fff; font-size: 11px; font-weight: 700; }

    .card-info { flex: 1; min-width: 0; }
    .card-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--accent);
      margin-bottom: 4px;
    }
    .card-title {
      font-size: 15px; font-weight: 700; line-height: 1.4;
      margin-bottom: 6px;
    }
    .card-title a { color: inherit; text-decoration: none; }
    .card-title a:hover { color: var(--accent); }
    .card-source {
      font-size: 12px; color: var(--text-muted);
      display: flex; align-items: center; gap: 6px;
    }
    .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border); }

    .card-title-en {
      font-size: 12px; color: var(--text-muted); font-style: italic;
      margin-top: 2px; margin-bottom: 4px;
    }

    .card-body { margin-top: 14px; }

    .summary-section { margin-bottom: 14px; }
    .summary-section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--text-muted); margin-bottom: 5px;
    }
    .summary-text {
      font-size: 13.5px; line-height: 1.7; color: #3a3630;
      white-space: pre-wrap;
    }

    /* ── Toggle ── */
    .toggle-row {
      display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap;
    }
    .toggle-btn {
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      background: var(--surface-2); border: none; border-radius: 6px;
      padding: 5px 11px; cursor: pointer; transition: all .15s;
    }
    .toggle-btn:hover { background: var(--border); color: var(--text); }

    /* ── Instagram panel ── */
    .ig-panel {
      margin-top: 14px;
      background: linear-gradient(135deg, #fdf0ed 0%, #fce8e2 100%);
      border: 1px solid #f3cec5;
      border-radius: 8px;
      padding: 14px 16px;
    }
    .ig-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--accent); margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .ig-text {
      font-size: 13px; line-height: 1.65; white-space: pre-wrap; color: #3a3630;
    }
    .copy-btn {
      margin-top: 10px; font-size: 12px; font-weight: 600;
      padding: 5px 12px; border-radius: 6px;
      border: 1.5px solid var(--accent); color: var(--accent);
      background: transparent; cursor: pointer; transition: all .15s;
    }
    .copy-btn:hover { background: var(--accent); color: #fff; }
    .copy-btn.copied { background: var(--green); border-color: var(--green); color: #fff; }

    /* ── Empty / loading ── */
    .state-msg {
      text-align: center; padding: 80px 20px;
      color: var(--text-muted); font-size: 14px;
    }
    .state-msg strong { display: block; font-size: 18px; color: var(--text); margin-bottom: 8px; }

    .skeleton {
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .sk-line { height: 13px; margin-bottom: 8px; }
    .sk-title { height: 18px; width: 75%; margin-bottom: 10px; }
  </style>
</head>
<body>

<header>
  <div class="logo">💪 <span>Fitness</span> Research</div>
  <div class="header-actions">
    <div id="statusMsg"></div>
    <button id="runBtn" onclick="runResearch()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path d="M9 10l6 2-6 2V10z" fill="currentColor" stroke="none"/></svg>
      Nova pesquisa
    </button>
  </div>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-title">Semanas</div>
    <div id="weekList"><div style="padding:18px;font-size:13px;color:var(--text-muted)">Carregando...</div></div>
  </aside>

  <main>
    <div id="content">
      <div class="state-msg"><strong>Selecione uma semana</strong>Escolha uma semana na barra lateral para ver os artigos.</div>
    </div>
  </main>
</div>

<script>
  let currentWeek = null;
  let allArticles = [];
  let currentWeekMeta = null;   // guarda week + generated_at + labels
  let activeFilter = 'all';
  let pollingInterval = null;

  // Mapa id -> caption para copiar sem passar dados pelo HTML
  const captionMap = {};

  // ── Boot ──────────────────────────────────────────────────────────────────
  loadWeeks();

  async function loadWeeks() {
    const res = await fetch('/api/weeks');
    const weeks = await res.json();
    renderSidebar(weeks);
    if (weeks.length > 0) selectWeek(weeks[0].week);
  }

  function renderSidebar(weeks) {
    const el = document.getElementById('weekList');
    if (!weeks.length) {
      el.innerHTML = '<div style="padding:18px;font-size:13px;color:var(--text-muted)">Nenhum relatório ainda.</div>';
      return;
    }
    el.innerHTML = weeks.map(w => {
      const allDone = w.read === w.total && w.total > 0;
      return `
        <div class="week-item" id="week-${w.week}" onclick="selectWeek('${w.week}')">
          <div>
            <div class="week-label">${formatWeekLabel(w.week)}</div>
            <div class="week-meta">${formatDate(w.generated_at)}</div>
          </div>
          <div class="week-pill ${allDone ? 'done' : ''}">${w.read}/${w.total}</div>
        </div>`;
    }).join('');
  }

  async function selectWeek(week) {
    currentWeek = week;
    activeFilter = 'all';
    document.querySelectorAll('.week-item').forEach(el => el.classList.remove('active'));
    const item = document.getElementById(`week-${week}`);
    if (item) item.classList.add('active');

    document.getElementById('content').innerHTML = renderSkeletons();
    const res = await fetch(`/api/weeks/${week}`);
    const data = await res.json();
    allArticles = data.articles;
    currentWeekMeta = { week: data.week, generated_at: data.generated_at, labels: data.labels };

    // Popula mapa de legendas
    for (const a of allArticles) {
      if (a.instagram_caption) captionMap[a.id] = a.instagram_caption;
    }

    renderContent();
  }

  // Usa variáveis globais — sem dados no onclick
  function renderContent() {
    if (!currentWeekMeta) return;
    const labels = ['all', ...currentWeekMeta.labels];
    const filtered = activeFilter === 'all'
      ? allArticles
      : allArticles.filter(a => a.label === activeFilter);
    const readCount = allArticles.filter(a => a.read).length;

    document.getElementById('content').innerHTML = `
      <div class="main-header">
        <div>
          <div class="main-title">${formatWeekLabel(currentWeekMeta.week)}</div>
          <div class="main-meta">Gerado em ${formatDate(currentWeekMeta.generated_at)} · ${allArticles.length} artigos · ${readCount} lidos</div>
        </div>
      </div>
      <div class="filters">
        ${labels.map(l => `<button class="filter-btn ${activeFilter === l ? 'active' : ''}" onclick="setFilter('${escapeAttr(l)}')">${l === 'all' ? 'Todos' : escapeHtml(l)}</button>`).join('')}
      </div>
      <div id="articleList">
        ${filtered.map(renderCard).join('')}
      </div>`;
  }

  function setFilter(label) {
    activeFilter = label;
    renderContent();
  }

  function renderCard(a) {
    // Compatível com formato antigo (title/summary) e novo (title_pt/title_en/objective...)
    const titlePt = a.title_pt || a.title || '';
    const titleEn = (a.title_en && a.title_en !== titlePt) ? a.title_en : '';
    const hasCaption = !!a.instagram_caption;

    return `
      <div class="card ${a.read ? 'read' : ''}" id="card-${a.id}">
        <div class="card-top">
          <div class="read-check ${a.read ? 'checked' : ''}" onclick="toggleRead('${a.id}', ${!a.read})" title="${a.read ? 'Marcar como não lido' : 'Marcar como lido'}"></div>
          <div class="card-info">
            <div class="card-label">${escapeHtml(a.label)}</div>
            <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${escapeHtml(titlePt)}</a></div>
            ${titleEn && titleEn !== titlePt ? `<div class="card-title-en">${escapeHtml(titleEn)}</div>` : ''}
            <div class="card-source">
              <span>${escapeHtml(a.source)}</span>
              <span class="dot"></span>
              <span>${escapeHtml(a.published_date)}</span>
            </div>
          </div>
        </div>
        <div class="card-body">
          ${a.objective
            ? renderSummarySection('🎯 Objetivo e Hipótese', a.objective) +
              renderSummarySection('✅ Conclusão', a.conclusion) +
              renderSummarySection('📊 Dados de Suporte', a.supporting_data)
            : renderSummarySection('📄 Resumo', a.summary || '')}
          ${hasCaption ? `
          <div class="toggle-row">
            <button class="toggle-btn" onclick="toggleIG('${a.id}')">📱 Ver legenda para Instagram</button>
          </div>
          <div class="ig-panel" id="ig-${a.id}" style="display:none">
            <div class="ig-label">📱 Sugestão de Legenda</div>
            <div class="ig-text">${escapeHtml(a.instagram_caption)}</div>
            <button class="copy-btn" id="copy-${a.id}" onclick="copyCaption('${a.id}')">Copiar legenda</button>
          </div>` : ''}
        </div>
      </div>`;
  }

  function renderSummarySection(title, text) {
    if (!text) return '';
    return `
      <div class="summary-section">
        <div class="summary-section-title">${title}</div>
        <div class="summary-text">${escapeHtml(text)}</div>
      </div>`;
  }

  async function toggleRead(id, isRead) {
    await fetch(`/api/articles/${id}/read`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ read: isRead }),
    });
    const article = allArticles.find(a => a.id === id);
    if (article) article.read = isRead;

    const card = document.getElementById(`card-${id}`);
    const check = card?.querySelector('.read-check');
    if (card) card.classList.toggle('read', isRead);
    if (check) check.classList.toggle('checked', isRead);

    // Atualiza contagem na sidebar sem recarregar semana selecionada
    const res = await fetch('/api/weeks');
    const weeks = await res.json();
    renderSidebar(weeks);
    const item = document.getElementById(`week-${currentWeek}`);
    if (item) item.classList.add('active');
  }

  function toggleIG(id) {
    const panel = document.getElementById(`ig-${id}`);
    if (!panel) return;
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  }

  async function copyCaption(id) {
    const text = captionMap[id] || '';
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById(`copy-${id}`);
    if (!btn) return;
    btn.textContent = 'Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar legenda'; btn.classList.remove('copied'); }, 2000);
  }

  // ── Run research ──────────────────────────────────────────────────────────
  async function runResearch() {
    const btn = document.getElementById('runBtn');
    const msg = document.getElementById('statusMsg');
    btn.disabled = true;
    btn.innerHTML = `<svg class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> Pesquisando...`;
    msg.textContent = 'Isso pode levar alguns minutos...';

    const res = await fetch('/api/research/run', { method: 'POST' });
    if (res.status === 409) {
      msg.textContent = 'Já está rodando...';
      btn.disabled = false;
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path d="M9 10l6 2-6 2V10z" fill="currentColor" stroke="none"/></svg> Nova pesquisa`;
      return;
    }

    clearInterval(pollingInterval);
    pollingInterval = setInterval(async () => {
      const s = await fetch('/api/research/status').then(r => r.json());
      if (s.status === 'done') {
        clearInterval(pollingInterval);
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path d="M9 10l6 2-6 2V10z" fill="currentColor" stroke="none"/></svg> Nova pesquisa`;
        msg.textContent = s.exit_code === 0 ? '✓ Pesquisa concluída!' : '✗ Erro ao pesquisar.';
        setTimeout(() => { msg.textContent = ''; }, 5000);
        if (s.exit_code === 0) loadWeeks();
      }
    }, 5000);
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function renderSkeletons() {
    return Array.from({length: 4}).map(() => `
      <div class="card">
        <div class="skeleton sk-title"></div>
        <div class="skeleton sk-line" style="width:45%"></div>
        <div style="margin-top:12px">
          <div class="skeleton sk-line"></div>
          <div class="skeleton sk-line"></div>
          <div class="skeleton sk-line" style="width:70%"></div>
        </div>
      </div>`).join('');
  }

  function formatWeekLabel(week) {
    const [year, w] = week.split('-W');
    return `Semana ${w} · ${year}`;
  }

  function formatDate(iso) {
    if (!iso) return '';
    try {
      return new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
    } catch { return iso; }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escapeAttr(str) {
    if (!str) return '';
    return str.replace(/'/g,"\\'");
  }
</script>
</body>
</html>
