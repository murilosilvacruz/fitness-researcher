# Configuração dos tópicos de pesquisa e fontes confiáveis
# Ajuste conforme seus interesses e área de atuação

# Número máximo de resultados buscados por tópico
max_results_per_topic: 2

# Limite total de artigos processados por execução (controla custo de API)
max_total_articles: 10

# Tópicos pesquisados a cada execução
# Use termos em inglês para ampliar o alcance nas fontes científicas internacionais
# Foco: mulheres não atletas, população geral, praticantes recreativas de qualquer idade
topics:
  - query: "strength training non-athlete women health benefits 2025 2026"
    label: "Musculação Feminina"

  - query: "menstrual cycle resistance training recreational women non-athlete"
    label: "Ciclo Menstrual e Treino"

  - query: "muscle hypertrophy resistance training untrained women general population"
    label: "Hipertrofia Feminina"

  - query: "exercise hormones estrogen women general population non-athlete"
    label: "Hormônios e Exercício"

  - query: "protein intake nutrition resistance training recreational women"
    label: "Nutrição e Musculação Feminina"

  - query: "physical exercise mental health women anxiety depression non-athlete"
    label: "Saúde Mental e Exercício"

  - query: "bone density osteoporosis exercise women general population non-athlete"
    label: "Saúde Óssea Feminina"

  - query: "physical activity health benefits sedentary women general population 2025 2026"
    label: "Pesquisas Recentes em Fisiologia"

# Domínios priorizados — fontes confiáveis e científicas
trusted_domains:
  - pubmed.ncbi.nlm.nih.gov
  - ncbi.nlm.nih.gov
  - journals.lww.com          # NSCA / Journal of Strength and Conditioning Research
  - acsm.org
  - examine.com
  - strongerbyscience.com
  - sciencedirect.com
  - nature.com
  - sports.gov
  - bmjopen.bmj.com
  - link.springer.com
